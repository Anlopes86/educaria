<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta | EducarIA</title>
    <link rel="stylesheet" href="assets/css/estilo-premium.css">
    <script src="https://www.gstatic.com/firebasejs/11.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.10.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.10.0/firebase-firestore-compat.js"></script>
    <script src="assets/js/firebase-config.js"></script>
    <script src="assets/js/auth-flow.js" defer></script>
</head>
<body class="product-body theme-auth" data-auth-page="true">
    <main class="auth-shell">
        <section class="auth-panel auth-panel--brand">
            <a href="index.html" class="auth-brand auth-brand--hero">
                <img src="assets/images/educar-logo.png" alt="EducarIA" class="auth-brand-logo-large">
            </a>
            <h1 class="auth-register-headline">
                <span>O melhor hub de</span>
                <span>ferramentas</span>
                <span>educacionais</span>
                <span>para professores</span>
                <span>do Brasil</span>
            </h1>
        </section>

        <section class="auth-panel auth-panel--form">
            <div class="page-section-title">
                <div>
                    <span class="platform-section-label">Cadastro</span>
                    <h2>Criar conta</h2>
                </div>
                <p>Preencha os dados do professor e crie uma senha para entrar na plataforma e começar a montar suas turmas.</p>
            </div>

            <form class="auth-form" data-register-form>
                <div class="platform-field">
                    <label for="register-name">Nome</label>
                    <input id="register-name" name="name" type="text" placeholder="Seu nome completo">
                </div>
                <div class="platform-field">
                    <label for="register-email">Email</label>
                    <input id="register-email" name="email" type="email" placeholder="professor@escola.com.br">
                </div>
                <div class="platform-field">
                    <label for="register-institution">Instituicao de ensino</label>
                    <input id="register-institution" name="institution" type="text" placeholder="Nome da escola ou rede de ensino">
                </div>
                <div class="platform-field">
                    <label for="register-password">Senha</label>
                    <input id="register-password" name="password" type="password" placeholder="Crie uma senha com pelo menos 6 caracteres">
                </div>
                <div class="platform-field">
                    <label for="register-password-confirm">Confirmar senha</label>
                    <input id="register-password-confirm" name="password_confirm" type="password" placeholder="Repita a senha">
                </div>

                <button type="submit" class="platform-link-button platform-link-primary auth-submit">Criar conta</button>
                <p class="auth-feedback" data-auth-feedback hidden></p>
            </form>

            <div class="auth-helper-card">
                <strong>Ja tem conta?</strong>
                <p>Entre com o email cadastrado para abrir sua plataforma.</p>
                <a href="login.html" class="platform-link-button platform-link-secondary">Ir para login</a>
            </div>
        </section>
    </main>
</body>
</html>
