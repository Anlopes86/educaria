<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula Completa | Apresentação</title>
    <link rel="stylesheet" href="../assets/css/estilo-premium.css">
    <script src="../assets/js/turma-context.js" defer></script>
    <script src="../assets/js/material-context.js" defer></script>
    <script src="../assets/js/lesson-library.js" defer></script>
    <script src="../assets/js/lesson-sequence-player.js" defer></script>
</head>
<body data-material-type="lesson">
    <main class="presentation-shell presentation-shell--lesson lesson-sequence-player-shell">
        <header class="presentation-topbar">
            <div class="presentation-brand">
                <div class="platform-brand-mark">EI</div>
                <div>
                    <strong data-lesson-player-title>Aula completa</strong>
                    <span data-lesson-player-class>Turma</span>
                </div>
            </div>
            <div class="platform-top-actions">
                <a href="criar-aula.html" class="platform-link-button platform-link-secondary">Voltar à edição</a>
                <a href="turma.html" class="platform-link-button platform-link-secondary">Voltar para a turma</a>
                <a href="apresentacao.html" class="platform-link-button platform-link-primary" data-lesson-player-open>Abrir bloco atual</a>
            </div>
        </header>

        <section class="presentation-frame lesson-sequence-player-stage">
            <aside class="presentation-side-panel lesson-sequence-player-sidebar">
                <div class="page-section-title page-section-title--compact">
                    <div>
                        <span class="platform-section-label">Sequência</span>
                        <h2>Blocos da aula</h2>
                    </div>
                    <p data-lesson-player-objective>Selecione um bloco para trocar a atividade exibida.</p>
                </div>
                <div class="lesson-sequence-player-list" data-lesson-player-list></div>
            </aside>

            <section class="lesson-sequence-player-frame">
                <div class="lesson-sequence-player-current" data-lesson-player-current>
                    <span class="route-tag">Sem bloco</span>
                    <h2>Essa aula ainda não tem atividades na sequência</h2>
                    <p>Volte para o editor e adicione pelo menos um material salvo.</p>
                </div>
                <div class="lesson-sequence-player-embed" data-lesson-player-embed hidden>
                    <iframe title="Preview da atividade" data-lesson-player-iframe></iframe>
                </div>
                <div class="presentation-controls lesson-sequence-player-controls">
                    <button type="button" class="platform-link-button platform-link-secondary" data-lesson-player-prev>Anterior</button>
                    <span class="presentation-counter" data-lesson-player-counter>0 de 0</span>
                    <button type="button" class="platform-link-button platform-link-primary" data-lesson-player-next>Próximo</button>
                </div>
            </section>
        </section>
    </main>
</body>
</html>
