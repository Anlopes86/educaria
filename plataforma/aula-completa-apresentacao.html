<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula Completa | Apresentação</title>
    <link rel="stylesheet" href="../assets/css/estilo-premium.css">
    <script src="../assets/js/storage-scope.js" defer></script>
    <script src="../assets/js/turma-context.js" defer></script>
    <script src="../assets/js/material-context.js" defer></script>
    <script src="../assets/js/lesson-library.js" defer></script>
    <script src="../assets/js/lesson-sequence-player.js" defer></script>
</head>
<body class="lesson-sequence-stage-page" data-material-type="lesson">
    <main class="lesson-sequence-stage-shell">
        <header class="lesson-sequence-stage-topbar">
            <div class="lesson-sequence-stage-actions">
                <a href="criar-aula.html" class="platform-link-button platform-link-secondary">Voltar à edição</a>
                <a href="turma.html" class="platform-link-button platform-link-secondary">Voltar para a turma</a>
            </div>
            <div class="lesson-sequence-stage-status">
                <span class="lesson-sequence-stage-title" data-lesson-player-current-title>Sem atividade</span>
                <span class="presentation-counter lesson-sequence-stage-counter" data-lesson-player-counter>0 de 0</span>
            </div>
        </header>

        <section class="lesson-sequence-stage-frame">
            <div class="lesson-sequence-stage-embed" data-lesson-player-embed hidden>
                <iframe title="Apresentação da atividade" data-lesson-player-iframe></iframe>
            </div>

            <div class="lesson-sequence-stage-empty" data-lesson-player-empty>
                <span class="route-tag">Sem bloco</span>
                <h2>Nenhuma atividade na sequência</h2>
                <p>Volte para o editor e adicione pelo menos um material salvo.</p>
            </div>

            <a href="apresentacao.html" class="lesson-sequence-stage-open" data-lesson-player-open aria-label="Abrir bloco atual em uma nova guia" target="_blank" rel="noopener noreferrer">Abrir bloco</a>

            <button type="button" class="presentation-nav-button presentation-nav-button--prev lesson-sequence-stage-nav" data-lesson-player-prev aria-label="Bloco anterior"></button>
            <button type="button" class="presentation-nav-button presentation-nav-button--next lesson-sequence-stage-nav" data-lesson-player-next aria-label="Próximo bloco"></button>
        </section>
    </main>
</body>
</html>
