<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula Completa | Apresenta&ccedil;&atilde;o</title>
    <link rel="stylesheet" href="../assets/css/estilo-premium.css">
    <script src="../assets/js/storage-scope.js" defer></script>
    <script src="../assets/js/turma-context.js" defer></script>
    <script src="../assets/js/material-context.js" defer></script>
    <script src="../assets/js/lesson-library.js" defer></script>
    <script src="../assets/js/lesson-sequence-player.js" defer></script>
</head>
<body class="presentation-page lesson-sequence-stage-page" data-material-type="lesson">
    <a class="skip-link" href="#main-content">Pular para o conteudo principal</a>
    <main id="main-content" class="lesson-sequence-stage-shell" tabindex="-1">
        <section class="lesson-sequence-stage-frame">
            <div class="lesson-sequence-stage-embed" data-lesson-player-embed hidden>
                <iframe title="Apresenta&ccedil;&atilde;o da atividade" data-lesson-player-iframe></iframe>
            </div>

            <div class="lesson-sequence-stage-empty" data-lesson-player-empty>
                <span class="route-tag">Sem bloco</span>
                <h2>Nenhuma atividade na sequ&ecirc;ncia</h2>
                <p>Volte para o editor e adicione pelo menos um material salvo.</p>
            </div>

            <button type="button" class="presentation-nav-button presentation-nav-button--prev lesson-sequence-stage-nav lesson-sequence-stage-nav--prev" data-lesson-player-prev aria-label="Bloco anterior">Anterior bloco</button>
            <button type="button" class="presentation-nav-button presentation-nav-button--next lesson-sequence-stage-nav lesson-sequence-stage-nav--next" data-lesson-player-next aria-label="Pr&oacute;ximo bloco">Pr&oacute;ximo bloco</button>
        </section>
    </main>
</body>
</html>
