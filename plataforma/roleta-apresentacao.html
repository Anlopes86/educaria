<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apresentacao da Roleta | EducarIA</title>
    <link rel="stylesheet" href="../assets/css/estilo-premium.css">
    <script src="../assets/js/storage-scope.js" defer></script>
    <script src="../assets/js/turma-context.js" defer></script>
    <script src="../assets/js/material-context.js" defer></script>
    <script src="../assets/js/wheel-runtime.js" defer></script>
</head>
<body data-material-type="wheel">
    <main class="presentation-shell wheel-presentation-shell">
        <header class="presentation-topbar presentation-topbar--minimal">
            <div class="platform-top-actions">
                <a href="roleta-builder.html" class="platform-link-button platform-link-secondary" data-return-to-editor>Voltar à edição</a>
                <a href="turma.html" class="platform-link-button platform-link-primary">Voltar para a turma</a>
            </div>
        </header>

        <section class="wheel-stage-shell wheel-stage-shell--full">
            <article class="wheel-stage-card wheel-stage-card--full">
                <div class="wheel-stage-playground">
                    <div class="wheel-stage-pointer"></div>
                    <div class="wheel-stage-svg" data-wheel-stage-svg></div>
                </div>
                <div class="wheel-stage-footer">
                    <div class="wheel-stage-result" data-wheel-stage-result>Aguardando giro</div>
                    <button type="button" class="platform-link-button platform-link-primary wheel-stage-spin-button" data-wheel-spin>Girar roleta</button>
                </div>
            </article>
        </section>
    </main>
</body>
</html>
