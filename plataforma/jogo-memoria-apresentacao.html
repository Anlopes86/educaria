<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apresentacao do Jogo da Memória | EducarIA</title>
    <link rel="stylesheet" href="../assets/css/estilo-premium.css">
    <script src="../assets/js/storage-scope.js" defer></script>

<body data-material-type="memory">
    <a class="skip-link" href="#main-content">Pular para o conteudo principal</a>
    <main id="main-content" class="presentation-shell memory-stage-shell" tabindex="-1">
        <header class="presentation-topbar presentation-topbar--minimal">

            <p class="presentation-inline-edit-note" data-inline-edit-note hidden>Os cards ficam abertos para editar os textos diretamente na tela.</p>

        <section class="memory-stage-layout memory-stage-layout--full">
            <article class="memory-stage-card memory-stage-card--full">

            </article>
        </section>
