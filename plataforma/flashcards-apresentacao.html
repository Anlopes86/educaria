<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apresentacao de Flashcards | EducarIA</title>
    <link rel="stylesheet" href="../assets/css/estilo-premium.css">
    <script src="../assets/js/storage-scope.js" defer></script>
    <script src="../assets/js/turma-context.js" defer></script>
    <script src="../assets/js/material-context.js" defer></script>
    <script src="../assets/js/flashcards-runtime.js" defer></script>
</head>
<body data-material-type="flashcards">
    <main class="presentation-shell flashcards-presentation-shell">
        <header class="presentation-topbar">
            <div class="presentation-brand">
                <div class="platform-brand-mark">EI</div>
                <div>
                    <strong>Modo de apresentacao dos flashcards</strong>
                    <span data-flashcard-class>8&ordm; ano B - Technology Vocabulary</span>
                </div>
            </div>
            <div class="platform-top-actions">
                <a href="flashcards-builder.html" class="platform-link-button platform-link-secondary">Voltar a edicao</a>
                <a href="turma.html" class="platform-link-button platform-link-primary">Voltar para a turma</a>
            </div>
        </header>

        <section class="flashcards-stage-shell flashcards-stage-shell--guided">
            <div class="presentation-controls presentation-controls--floating flashcards-floating-controls">
                <button type="button" class="presentation-nav-button presentation-nav-button--prev" data-flashcard-prev aria-label="Flashcard anterior">Anterior</button>
                <button type="button" class="presentation-nav-button presentation-nav-button--next" data-flashcard-next aria-label="Próximo flashcard">Proximo</button>
            </div>
            <article class="flashcards-stage-card" data-flashcard-stage>
                <div class="flashcards-stage-header">
                    <div>
                        <span class="platform-section-label">Flashcards em sala</span>
                        <h1 data-flashcard-theme>Technology Vocabulary</h1>
                    </div>
                    <span class="presentation-counter" data-flashcard-counter>1 de 1</span>
                </div>

                <div class="flashcards-stage-scene">
                    <div class="flashcards-stage-inner">
                        <section class="flashcards-stage-face flashcards-stage-face--front" data-flashcard-front-face>
                            <span class="flashcards-face-label">Frente</span>
                            <strong data-flashcard-front>keyboard</strong>
                        </section>
                        <section class="flashcards-stage-face flashcards-stage-face--back" data-flashcard-back-face>
                            <span class="flashcards-face-label">Verso</span>
                            <strong data-flashcard-back>teclado</strong>
                            <div class="flashcards-stage-example" data-flashcard-example-block>
                                <span>Anotacoes</span>
                                <p data-flashcard-example>The keyboard is on the desk.</p>
                            </div>
                        </section>
                    </div>
                </div>

                <div class="flashcards-stage-actions">
                    <button type="button" class="platform-link-button platform-link-primary" data-flashcard-flip>Ver verso</button>
                </div>
            </article>
        </section>
    </main>
</body>
</html>
