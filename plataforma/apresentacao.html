<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apresentação | EducarIA</title>
    <link rel="stylesheet" href="../assets/css/estilo-premium.css">
    <script src="../assets/js/storage-scope.js" defer></script>
    <script src="../assets/js/turma-context.js" defer></script>
    <script src="../assets/js/material-context.js" defer></script>
    <script src="../assets/js/presentation-runtime.js" defer></script>
</head>
<body class="presentation-page">
    <main class="presentation-shell presentation-shell--lesson">
        <header class="presentation-topbar">
            <div class="presentation-brand">
                <div class="platform-brand-mark">EI</div>
                <div>
                    <strong>Modo de apresentação</strong>
                    <span data-presentation-class>8&ordm; ano B - Technology &amp; Education</span>
                </div>
            </div>
            <div class="platform-top-actions">
                <a href="slides-builder.html" class="platform-link-button platform-link-secondary">Voltar à edição</a>
                <a href="turma.html" class="platform-link-button platform-link-primary">Voltar para a turma</a>
            </div>
        </header>

        <section class="presentation-frame presentation-frame--solo presentation-frame--teacher">
            <article class="presentation-slide presentation-slide--media presentation-slide--stack" data-presentation-slide style="visibility:hidden;">
                <div class="presentation-slide-copy" data-presentation-copy>
                    <h1 data-presentation-title>Has technology changed education?</h1>
                    <h2 data-presentation-subtitle>Observe a transforma&ccedil;&atilde;o da sala de aula</h2>
                    <div class="presentation-slide-body" data-presentation-body>Observe as imagens e pense no que mudou na sala de aula ao longo dos anos.</div>
                </div>

                <div class="presentation-media" data-presentation-media hidden>
                    <img data-presentation-image alt="">
                </div>
            </article>

            <div class="presentation-controls presentation-controls--floating" data-presentation-controls>
                <button type="button" class="presentation-nav-button presentation-nav-button--prev" data-presentation-prev aria-label="Slide anterior">Anterior</button>
                <span class="presentation-counter" data-presentation-counter>1 de 1</span>
                <button type="button" class="presentation-nav-button presentation-nav-button--next" data-presentation-next aria-label="Pr&oacute;ximo slide">Pr&oacute;ximo</button>
            </div>
        </section>
    </main>
</body>
</html>
