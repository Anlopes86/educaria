<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar | EducarIA</title>
    <link rel="stylesheet" href="assets/css/estilo-premium.css">
    <script src="https://www.gstatic.com/firebasejs/11.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.10.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.10.0/firebase-firestore-compat.js"></script>
    <script src="assets/js/firebase-config.js"></script>
    <script src="assets/js/auth-flow.js" defer></script>
</head>
<body class="product-body theme-auth" data-auth-page="true">
    <main class="auth-shell">
        <section class="auth-panel auth-panel--brand">
            <a href="landing.html" class="auth-brand auth-brand--hero">
                <img src="assets/images/educar-logo.png" alt="EducarIA" class="auth-brand-logo-large">
            </a>
            <h1>O melhor HUB de atividades para professores do Brasil</h1>
        </section>

        <section class="auth-panel auth-panel--form">
            <div class="page-section-title">
                <div>
                    <span class="platform-section-label">Entrar</span>
                    <h2>Acesse sua conta</h2>
                </div>
                <p>Use email e senha para abrir sua conta e continuar o trabalho na plataforma.</p>
            </div>

            <form class="auth-form" data-login-form>
                <div class="platform-field">
                    <label for="login-email">Email</label>
                    <input id="login-email" name="email" type="email" placeholder="professor@escola.com.br">
                </div>
                <div class="platform-field">
                    <label for="login-password">Senha</label>
                    <input id="login-password" name="password" type="password" placeholder="Digite sua senha">
                </div>

                <button type="submit" class="platform-link-button platform-link-primary auth-submit">Entrar</button>
                <p class="auth-feedback" data-auth-feedback hidden></p>
            </form>

            <div class="auth-helper-card">
                <strong>Ainda nao tem cadastro?</strong>
                <p>Crie sua conta com nome, email e instituicao de ensino para comecar.</p>
                <a href="cadastro.html" class="platform-link-button platform-link-secondary">Criar cadastro</a>
            </div>
        </section>
    </main>
</body>
</html>
